<!DOCTYPE html>

<body>
  <script>
    function arrMax(arr) {
      let max = arr[0]
      for (let i = 1; i < arr.length; i++) {
        if (arr[i] > max) {
          max = arr[i]
        }
      }
      return console.log('数组最大值:', max)
    }
    arrMax([100, 93, 96, 42, 57])
  </script>
</body>
