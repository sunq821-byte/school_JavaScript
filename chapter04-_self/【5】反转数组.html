  <script>
    function recerseArray(arr) {
      const newArr = new Array(arr.length)
      for (let i = 0; i < arr.length; i++) {
        newArr[i] = arr[arr.length - 1 - i]
      }
      return console.log(newArr)
    }
    recerseArray([1, 2, 3, 4, 5])
  </script>
