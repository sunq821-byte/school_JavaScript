<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
    let time1 = +new Date()
    let time2 = +new Date(2026,11-1,11,0,0,0)

    let diff = time2-time1
    
    let day = Math.floor(diff / 1000 / 60 / 60 / 24);
    let hour = Math.floor(diff / 1000 / 60 / 60 % 24);
    let minute = Math.floor(diff / 1000 / 60 % 60);
    let second = Math.floor(diff / 1000 % 60);

    console.log("距离2026-11-11：" + day + "天 " + hour + "时 " + minute + "分 " + second + "秒");

    </script>
</body>
</html>
