<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let str = 'Hello World,Hello JavaScript'
        let index = str.indexOf('o')
        let num = 0
        while(index!=-1){
            console.log(index)
            index = str.indexOf('o',index+1)
            num++
        }
        console.log(`o出现的次数为${num}`)
    </script>
</body>
