<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <script>
    function getRandom() {
      return Math.floor(Math.random() * 10) + 1
    }
    let count = 0
    const guess = getRandom()
    for (let i = 0; i <= 5; i++) {
      let num = prompt('请输入1-10的值：')
      if (num > guess) {
        alert('猜大了')
        count++
      } else if (num < guess) {
        alert('猜小了')
        count++
      } else {
        alert('猜对了,共猜了' + count + '次')
        break
      }

    }
  </script>
</body>

</html>
