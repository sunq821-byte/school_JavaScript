<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // 1.日期时间输出
        let date01 = new Date()
        console.log(date01)
        document.write(date01)
        document.write('<br>')

        // 2.传入参数
        let date02 = new Date(2026,12-1,21,14,7,40)
        document.write(date02)
        document.write('<br>')

        // 3.传入字符串型参数
        let date03 = new Date('2026-4-21 14:10:33')
        document.write(date03)

    </script>
</body>
</html>
