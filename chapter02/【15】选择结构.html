<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>选择结构</title>
</head>

<body>
  <script>
    //1： if语句，
    // 实现只有当年龄大于或等于18周岁时，才输出“已成年”，否则不输出任何信息。
    var age = 23;               // 声明变量age并赋值为23
    if (age >= 18) {
      console.log('已成年');    // 在控制台输出“已成年”
    }
    //2：if...else语句，
    // 实现当年龄大于等于18周岁时，输出“已成年”，否则输出“未成年”
    var age = 17;               // 声明变量age并赋值为17
    if (age >= 18) {
      console.log('已成年');     // 当age >= 18时在控制台输出“已成年”
    } else {
      console.log('未成年');     // 当age < 18时在控制台输出“未成年”
    }

    //3：if...else if...else语句，
    // 实现对学生考试成绩按分数进行等级的划分：
    // 90~100分为优秀；80~90分为良好； 70~80分为中等； 60~70分为及格；小于60分为不及格。
    var score = 78;						    // 声明变量score并赋值为83
    if (score >= 90) {
      console.log('优秀');				// 当score >= 90时在控制台输出“优秀”
    } else if (score >= 80) {
      console.log('良好');				// 当score >= 80时在控制台输出“良好”
    } else if (score >= 70) {
      console.log('中等');				// 当score >= 70时在控制台输出“中等”
    } else if (score >= 60) {
      console.log('及格');				// 当score >= 60时在控制台输出“及格”
    } else {
      console.log('不及格');			// 当score < 60时在控制台输出“不及格”
    }

    // switch语句，
    // 实现判断变量week的值，当week变量的值为1~6时，输出星期一~星期六，当变量week的值为0时，输出星期日。
    // 如果没有与变量week的值相等的case值，则输出“输入错误，请重新输入”。
    var week = 3;
    switch (week) {
      case 0:
        console.log('星期日');
        break;
      case 1:
        console.log('星期一');
        break;
      case 2:
        console.log('星期二');
        break;
      case 3:
        console.log('星期三');
        break;
      case 4:
        console.log('星期四');
        break;
      case 5:
        console.log('星期五');
        break;
      case 6:
        console.log('星期六');
        break;
      default:
        console.log('输入错误，请重新输入');
    };
  </script>
</body>

</html>
