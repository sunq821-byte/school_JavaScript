<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>将数据转换为字符串型数据</title>
</head>
<body>
  <script>
    var num01 = 23;
    var num02 = 46;
    console.log(String(num01));				  // 输出结果为：23
    console.log(num01.toString());			// 输出结果为：23
    console.log(num02.toString(2));			// 输出结果为：101110
  </script>
</body>
</html>
