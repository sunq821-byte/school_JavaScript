<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title> 生成九九乘法表
</title>
</head>
<body>
  <script>
    var str = '';
    for (var i = 1; i <= 9; i++) {
      for (var j = 1; j <= i; j++) {
        str += j + '×' + i + '=' + i * j + '\t';
      }
      str += '\n';
    }
    console.log(str);
  </script>
</body>
</html>
