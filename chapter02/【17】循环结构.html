<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>循环结构</title>
</head>
<body>
  <script>
    //1： for语句，实现在控制台中输出1~100的整数
    for (var i = 1; i <= 100; i++) {
      console.log(i);    // 输出结果为：1 2 3 4 5 6, …, 100
    }
    //2：while语句，实现在控制台中输出1~100的整数
    var i = 1;
    while (i <= 100) {
      console.log(i);
      i++;
    }
    // 3：do while语句，实现在控制台中输出1~100的整数
    var i = 1;
    do {
      console.log(i);
      i++;
    } while (i <= 100)
  </script>
</body>
</html>
