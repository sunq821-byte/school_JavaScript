<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>使用typeof运算符进行数据类型的检测</title>
</head>
<body>
  <script>
    console.log(typeof 23);					          // 输出结果为： number
    console.log(typeof '水果');			    	    // 输出结果为： string
    console.log(typeof false);			    	    // 输出结果为： boolean
    console.log(typeof null);				          // 输出结果为： object
    console.log(typeof undefined);			      // 输出结果为： undefined

    var password = prompt('请输入您的密码:');
    console.log(password);
    console.log(typeof password);

    var password = '123456';
    console.log(typeof password == 'string');	// 输出结果为： true
    console.log(typeof password == 'number');	// 输出结果为： false
  </script>
</body>
</html>
