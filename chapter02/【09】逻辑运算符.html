<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>逻辑运算符</title>
</head>
<body>
  <script>
    // 逻辑“与”
    console.log(100 && 200);			    // 输出结果为：200
    console.log(0 && 123);            // 输出结果为：0
    console.log(3 > 2 && 4 > 3);		  // 输出结果为：true
    console.log(2 < 1 && 3 > 1);		  // 输出结果为：false
    // 逻辑“或”
    console.log(100 || 200);          // 输出结果为：100
    console.log(0 || 123);            // 输出结果为：123
    console.log(3 > 2 || 4 < 3);		  // 输出结果为：true
    console.log(2 < 1 || 3 < 1);		  // 输出结果为：false
    // 逻辑“非”
    console.log(!(2 > 1));				    // 输出结果为：false
    console.log(!(2 < 1));				    // 输出结果为：true

    //短路
    var a = 1;
    false && a++;					            // &&短路情况，未运行a++
    console.log(a);					          // 输出结果为：1
    true || a++;					            // ||短路情况,，未运行a++
    console.log(a);					          // 输出结果为：1
  </script>
</body>
</html>
