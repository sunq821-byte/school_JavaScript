<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
//         本案例要求定义一个用于保存售货员输入的蔬菜名称的变量vegetable，然后使用switch语
// 句实现查询对应蔬菜的价格。
// 当售货员输入需要查询的蔬菜名称后，控制台会输出对应的蔬菜价格，其中，芹菜的价格
// 是3.2元/kg；黄瓜的价格是2.5元/kg；莲藕的价格是9.0元/kg；土豆的价格是1.2元/kg。
// 如果输入的蔬菜名称不存在，则输出“没有此蔬菜”。
        var vegetable = prompt('请输入蔬菜名称：')
        switch (vegetable) {
            case '芹菜':
                console.log(vegetable+'的价格为3.2元/kg')
                document.write(vegetable+'的价格为3.2元/kg')
                break
            case '黄瓜':
                console.log(vegetable+'的价格为2.5元/kg')
                document.write(vegetable+'的价格为2.5元/kg')
                break
            case '莲藕':
                console.log(vegetable+'的价格为9.0元/kg')
                document.write(vegetable+'的价格为9.0元/kg')
                break
            case '土豆':
                console.log(vegetable+'的价格为1.2元/kg')
                document.write(vegetable+'的价格为1.2元/kg')
                break
            default:
                console.log('没有此蔬菜')
                document.write('没有此蔬菜')
        }

    </script>
</body>
</html>
