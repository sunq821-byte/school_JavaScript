<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
//         下面演示switch语句的使用，实现判断变量week的值，
// 当week变量的值为1~6时，输出星期一~星期六，当
// 变量week的值为0时，输出星期日。
// 如果没有与变量week的值相等的case值，则输出“输
// 入错误，请重新输入”
        var input = prompt("请输入0~6：")
        var week = parseInt(input,10)
        switch (week) {
            case 0:
                console.log('星期日')
                document.write('星期日')
                break
            case 1:
                console.log('星期一')
                document.write('星期一')
                break
            case 2:
                console.log('星期二')
                document.write('星期二')
                break
            case 3:
                console.log('星期三')
                document.write('星期三')
                break
            case 4:
                console.log('星期四')
                document.write('星期四')
                break
            case 5:
                console.log('星期五')
                document.write('星期五')
                break
            case 6:
                console.log('星期六')
                document.write('星期六')
                break
            default:
                console.log('输入错误，请重新输入')
                document.write('输入错误，请重新输入')
        } 
    </script>
</body>
</html>
