<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>赋值运算符</title>
</head>
<body>
  <script>
    var a = 5;
    a += 3;                     // 相当于a = a + 3
    console.log(a);             // 输出结果为：8
    a -= 4;                     // 相当于a = a - 4
    console.log(a);             // 输出结果为：4
    a *= 2;                     // 相当于a = a * 2
    console.log(a);             // 输出结果为：8
    a /= 2;                     // 相当于a = a / 2
    console.log(a);             // 输出结果为：4
    a %= 2;                     // 相当于a = a % 2
    console.log(a);             // 输出结果为：0
    a **= 2;                    // 相当于a = a ** 2
    console.log(a);             // 输出结果为：0
  </script>
</body>
</html>
