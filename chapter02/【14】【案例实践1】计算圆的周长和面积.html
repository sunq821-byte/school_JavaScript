<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Document</title>
</head>
<body>
  <script>
    var radius = prompt('请输入圆的半径：');             // radius表示圆的半径
    radius = parseFloat(radius);                       //浮点型
    var c = 2 * 3.14 * radius;                         // c表示圆的周长 
    var s = 3.14 * radius * radius;                    // s表示圆的面积
    console.log('圆的周长为：' + c.toFixed(2));         // 输出圆的周长
    console.log('圆的面积为：' + s.toFixed(2));         // 输出圆的面积
  </script>
</body>
</html>
