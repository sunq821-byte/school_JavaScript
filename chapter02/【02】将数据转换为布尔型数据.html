<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>将数据转换为布尔类型</title>
</head>
<body>
  <script>
    console.log(Boolean(''));				    // 输出结果为：false
    console.log(Boolean(0));				    // 输出结果为：false
    console.log(Boolean(NaN));			    // 输出结果为：false
    console.log(Boolean(null));			    // 输出结果为：false
    console.log(Boolean(undefined));		// 输出结果为：false
    console.log(Boolean('小智'));			  // 输出结果为：true
    console.log(Boolean(123456));			  // 输出结果为：true
  </script>
</body>
</html>
