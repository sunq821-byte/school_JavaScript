<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
//         本案例要求运用运算符的知识，实现计算圆的周长和面积。其中，计算圆的
// 周长的公式为2pir，计算圆的面积的公式为pir2。
// 公式中，表示圆周率，在代码中使用圆周率的近似值3.14；r表示圆的半径。
// 下面根据公式编写代码实现计算圆的周长和面积。
        var pi = 3.14
        var r = prompt('请输入圆的半径')

        var l = 2*pi*r
        var s = pi*r*r

        console.log(l,s)
    </script>
</body>
</html>
