<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>比较运算符</title>
</head>
<body>
  <script>
    console.log(13 > 12); 			// 输出结果为：true
    console.log(13 < 12); 			// 输出结果为：false
    console.log(13 >= 12); 		  // 输出结果为：true
    console.log(13 <= 12); 		  // 输出结果为：false
    console.log(13 == '13'); 		// 输出结果为：true
    console.log(13 != 12); 		  // 输出结果为：true
    console.log(13 === '13');		// 输出结果为：false
  </script>
</body>
</html>
