<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>位运算符</title>
</head>
<body>
  <script>
    console.log(15 & 9);          // 输出结果为：9（相当于1111 & 1001  = 1001）
    console.log(15 | 9);          // 输出结果为：15（相当于1111 | 1001 = 1111）
    console.log(~15);             // 输出结果为：-16（相当于～1111 = -10000）
    console.log(15 ^ 9);          // 输出结果为：6（相当于1111 ^ 1001  = 110）
    console.log(9 << 2);          // 输出结果为：36（相当于1001 << 2 = 100100）
    console.log(9 >> 2);          // 输出结果为：2（相当于1001 >> 2 =  10）
    console.log(19 >>> 2);        // 输出结果为：4（相当于10011 >>> 2  = 100）
  </script>
</body>
</html>
