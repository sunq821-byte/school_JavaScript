<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>猜数字游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        
        .settings {
            margin-bottom: 30px;
            padding: 20px;
            background-color: #f9f9f9;
            border-radius: 5px;
        }
        
        .setting-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        
        input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        
        .game-area {
            margin-bottom: 30px;
        }
        
        .guess-section {
            margin-bottom: 20px;
        }
        
        #guess-input {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border: 2px solid #ddd;
            border-radius: 5px;
            margin-bottom: 10px;
        }
        
        button {
            background-color: #4CAF50;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 10px;
        }
        
        button:hover {
            background-color: #45a049;
        }
        
        button:active {
            background-color: #3e8e41;
        }
        
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            font-size: 18px;
            text-align: center;
        }
        
        .result.correct {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .result.too-high {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .result.too-low {
            background-color: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }
        
        .info {
            margin-top: 20px;
            padding: 15px;
            background-color: #e9ecef;
            border-radius: 5px;
        }
        
        .info p {
            margin-bottom: 5px;
        }
        
        .history {
            margin-top: 20px;
        }
        
        .history h3 {
            margin-bottom: 10px;
        }
        
        .history-list {
            list-style: none;
            max-height: 200px;
            overflow-y: auto;
            padding: 10px;
            background-color: #f9f9f9;
            border-radius: 5px;
        }
        
        .history-list li {
            padding: 5px;
            border-bottom: 1px solid #eee;
        }
        
        .history-list li:last-child {
            border-bottom: none;
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 24px;
            }
            
            input[type="number"] {
                padding: 8px;
            }
            
            #guess-input {
                padding: 12px;
            }
            
            button {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>猜数字游戏</h1>
        
        <div class="settings">
            <h2>游戏设置</h2>
            <div class="setting-group">
                <label for="min-value">最小值：</label>
                <input type="number" id="min-value" value="1" min="0">
            </div>
            <div class="setting-group">
                <label for="max-value">最大值：</label>
                <input type="number" id="max-value" value="100" min="1">
            </div>
            <div class="setting-group">
                <label for="max-attempts">最大猜测次数：</label>
                <input type="number" id="max-attempts" value="10" min="1">
            </div>
            <button id="start-game">开始游戏</button>
        </div>
        
        <div class="game-area">
            <h2>游戏区域</h2>
            <div class="guess-section">
                <input type="number" id="guess-input" placeholder="请输入您的猜测..." disabled>
                <button id="submit-guess" disabled>提交猜测</button>
            </div>
            
            <div class="result" id="result"></div>
            
            <div class="info">
                <p>目标范围：<span id="range-info">未设置</span></p>
                <p>剩余次数：<span id="attempts-left">0</span></p>
            </div>
            
            <div class="history">
                <h3>猜测历史</h3>
                <ul class="history-list" id="history-list"></ul>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
