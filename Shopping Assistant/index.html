<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小智的购物助手</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <header>
      <h1>🛒 小智的购物助手</h1>
    </header>

    <div class="main">
      <!-- 欢迎区 -->
      <div class="welcome" id="welcomeArea">
        <h2>👋 欢迎来到购物助手！</h2>
        <p id="userDisplay">点击下方按钮开始购物</p>
        <button class="btn" onclick="startShopping()" id="startBtn">
          🚀 开始购物
        </button>
      </div>

      <!-- 购物车显示区 -->
      <div class="cart">
        <h2>🛍️ 当前购物车</h2>
        <div id="cartContainer">
          <table id="cartTable">
            <thead>
              <tr>
                <th>商品名称</th>
                <th>单价（元）</th>
                <th>数量</th>
                <th>小计（元）</th>
              </tr>
            </thead>
            <tbody id="cartBody">
              <!-- JavaScript 动态填充 -->
            </tbody>
          </table>

          <!-- 总计区域 -->
          <div id="totalArea" class="total">
            <div>
              <strong>总件数：</strong> <span id="totalQty">0</span> 件
            </div>
            <div>
              <strong>总金额：</strong> <span id="totalAmount">0.00</span> 元
            </div>
            <div>
              <strong>运费：</strong> <span id="shipping">10.00</span> 元
            </div>
            <div>
              <strong>实付金额：</strong> <span id="finalAmount" style="color:#ff6600;">10.00</span> 元
            </div>
          </div>

          <div id="emptyCart" class="empty">
            购物车还是空的～<br>快去添加商品吧！
          </div>
        </div>
      </div>

      <!-- 操作按钮 -->
      <div class="actions">
        <button class="btn" onclick="startShopping()" id="addMoreBtn" style="display: none;">
          ➕ 继续添加商品
        </button>
        <button class="btn btn-secondary" onclick="resetCart()">
          🔄 清空购物车
        </button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
