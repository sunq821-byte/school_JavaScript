<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <script>
    // 数组反转
    let week = [1, 2, 3, 4, 5, 6, 7]
    let newWeek = []
    for (let i = week.length - 1; i >= 0; i--) {
      newWeek.push(week[i])
    }
    document.write(newWeek)
    document.write('<br>')

    // 冒泡排序
    let arr = [23, 35, 15, 60, 88, 90]
    for (let i = 0; i < arr.length; i++) {
      for (let j = 0; j < arr.length; j++) {
        if (j >= 0 && arr[j] < arr[j + 1]) {
          let temp = arr[j]
          arr[j] = arr[j + 1]
          arr[j + 1] = temp
        }
      }
    }
    document.write(arr)

  </script>
</body>

</html>
