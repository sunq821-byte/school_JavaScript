<body>
  <script>
    let arr = [98, 31, 5, 27, 2, 78];
    // for (let i = 1; i < arr.length; i++) {
    //   // 保存当前要插入的元素
    //   let key = arr[i];
    //   // 从已排序部分的末尾开始向前查找
    //   let j = i - 1;
    //   // 当j >= 0且已排序元素大于key时，将元素后移
    //   while (j >= 0 && arr[j] > key) {
    //     arr[j + 1] = arr[j];
    //     j--;
    //   }
    //   // 找到合适位置，插入key
    //   arr[j + 1] = key;
    // }
    for (let i = 1; i < arr.length; i++) {
      let key = arr[i]
      let j = i - 1
      while (j >= 0 && arr[j] > key) {
        arr[j + 1] = arr[j]
        j--
      }
      arr[j + 1] = key
    }
    document.write(arr); // 输出: [2, 5, 27, 31, 78, 98]
  </script>
</body>
