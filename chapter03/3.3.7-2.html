<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Document</title>
</head>
<body>
  <script>
    // 脚下留心

    console.log(typeof []);        		// 输出结果为：object

    var arr = [];
    arr['fruit'] = 'apple';
    console.log(arr['fruit']);  	    // 输出结果为：apple
    
    var arr1 = [1, 2];
    var arr2 = arr1;          			  // 引用传递，arr2和arr1引用同一个数组
    arr2[2] = 3;              			  // 此时arr2相当于arr1的别名
    console.log(arr1);        			  // 输出结果为：(3) [1, 2, 3]
  </script>
</body>
</html>
