<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Document</title>
</head>
<body>
  <script>
    var arr = [[10, 20, 30], [40, 50, 60]]; 		      // 创建二维数组
    for (var i = 0; i < arr.length; i++) {			      // 遍历二维数组中的元素
      for (var j = 0; j < arr[i].length; j++) {	  	  // 遍历一维数组中的元素
        console.log(arr[i][j]);					  	          // 输出二维数组中的每个元素
      }
    }
  </script>
</body>
</html>
