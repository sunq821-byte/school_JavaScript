<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Document</title>
</head>
<body>
  <script>
    var arr = ['tiger', 'elephant', 'cat', 'dog', 'bear', 'monkey'];
    var newArr = [];
    for (var i = arr.length - 1; i >= 0; i--) {
      newArr[newArr.length] = arr[i];
    }
    console.log(newArr);
    // 输出结果为：(6) ['monkey', 'bear', 'dog', 'cat', 'elephant', 'tiger']
  </script>
</body>
</html>
