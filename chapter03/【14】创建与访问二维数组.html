<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Document</title>
</head>
<body>
  <script>
    // 创建二维数组
    var arr = [[89, 98, 80], [95, 83, 85], [93, 86, 79]];
    // 访问二维数组
    console.log(arr[0][0]);            	// 输出结果为：89
    console.log(arr[0][1]);         	  // 输出结果为：98
    console.log(arr[0][2]);         	  // 输出结果为：80
    console.log(arr[1][0]);            	// 输出结果为：95
    console.log(arr[1][1]);         	  // 输出结果为：83
    console.log(arr[1][2]);         	  // 输出结果为：85
    console.log(arr[2][0]);            	// 输出结果为：93
    console.log(arr[2][1]);         	  // 输出结果为：86
    console.log(arr[2][2]);         	  // 输出结果为：79
    console.log(arr[0]);                // 输出结果为：(3) [89, 98, 80]
    console.log(arr[1]);                // 输出结果为：(3) [95, 83, 85]
    console.log(arr[2]);                // 输出结果为：(3) [93, 86, 79]
  </script>
</body>
</html>
