<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Document</title>
</head>

<body>
  <script>
    var arr = [[10, 20, 30], [40, 50, 60], [70, 80, 90]];
    var sum = 0;
    for (var i = 0; i < arr.length; i++) {
      for (var j = 0; j < arr[i].length; j++) {
        sum += arr[i][j];
      }
    }
    document.write(sum);
  </script>
</body>

</html>
