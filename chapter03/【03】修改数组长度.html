<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Document</title>
</head>

<body>
  <script>
    // 修改数组长度
    var arr3 = [0, 1];
    arr3.length = 4;						        // 修改数组长度为4
    console.log(arr3);						      // 输出结果为: (4) [0, 1, empty × 2]

    var arr4 = [0, 1];
    arr4.length = 2;						        // 修改数组长度为2
    console.log(arr4);						      // 输出结果为: (2) [0, 1]

    var arr5 = [0, 1, 2, 3];
    arr5.length = 5;						        // 修改数组长度为3
    console.log(arr5);				      // 输出结果为: (3) [0, 1, 2]
  </script>
</body>

</html>
