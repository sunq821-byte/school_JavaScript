<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>治愈风登录页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #E0F7FA, #FFEBEE);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            width: 360px;
            background: #fff;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #424242;
        }

        .input-group {
            margin-bottom: 15px;
            position: relative;
        }

        .input-group input {
            width: 100%;
            padding: 12px 12px 12px 35px;
            border-radius: 8px;
            border: 1px solid #EEEEEE;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: #4FC3F7;
        }

        .input-group i {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #4FC3F7;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-btn:hover {
            transform: scale(1.05);
        }

        /* 云朵精灵 */
        .cloud {
            position: absolute;
            right: -120px;
            top: 50px;
            width: 100px;
            height: 60px;
            background: white;
            border-radius: 50px;
            transition: 0.4s;
        }

        .cloud::before,
        .cloud::after {
            content: '';
            position: absolute;
            background: white;
            border-radius: 50%;
        }

        .cloud::before {
            width: 50px;
            height: 50px;
            top: -20px;
            left: 10px;
        }

        .cloud::after {
            width: 60px;
            height: 60px;
            top: -10px;
            right: 10px;
        }

        /* 脸 */
        .eye {
            width: 6px;
            height: 6px;
            background: black;
            border-radius: 50%;
            position: absolute;
            top: 25px;
        }

        .eye.left {
            left: 25px;
        }

        .eye.right {
            right: 25px;
        }

        .blush {
            width: 10px;
            height: 6px;
            background: #FFB6C1;
            border-radius: 50%;
            position: absolute;
            top: 35px;
        }

        .blush.left {
            left: 15px;
        }

        .blush.right {
            right: 15px;
        }

        .mouth {
            width: 12px;
            height: 6px;
            border-bottom: 2px solid #333;
            border-radius: 50%;
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
        }

        /* 动画状态 */
        .peek {
            transform: rotate(-15deg);
        }

        .shy .eye {
            background: transparent;
            border-top: 2px solid black;
            height: 0;
        }

        .happy {
            animation: spin 0.6s linear;
        }

        .sad {
            transform: rotate(10deg);
        }

        .sad .mouth {
            border-bottom: none;
            border-top: 2px solid #333;
        }

        @keyframes spin {
            0% {
                transform: rotate(0);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div class="login-card">
        <h2>欢迎登录</h2>

        <div class="input-group">
            <i>👤</i>
            <input type="text" id="username" placeholder="账号">
        </div>

        <div class="input-group">
            <i>🔒</i>
            <input type="password" id="password" placeholder="密码">
        </div>

        <button class="login-btn" onclick="login()">登录</button>

        <!-- 云朵精灵 -->
        <div class="cloud" id="cloud">
            <div class="eye left"></div>
            <div class="eye right"></div>
            <div class="blush left"></div>
            <div class="blush right"></div>
            <div class="mouth"></div>
        </div>
    </div>

    <script>
        const username = document.getElementById('username');
        const password = document.getElementById('password');
        const cloud = document.getElementById('cloud');

        username.addEventListener('focus', () => {
            cloud.classList.remove('shy');
            cloud.classList.add('peek');
        });

        password.addEventListener('focus', () => {
            cloud.classList.remove('peek');
            cloud.classList.add('shy');
        });

        function login() {
            cloud.classList.remove('sad', 'happy');

            if (username.value === "admin" && password.value === "123456") {
                cloud.classList.add('happy');
            } else {
                cloud.classList.add('sad');
            }
        }
    </script>

</body>

</html>
