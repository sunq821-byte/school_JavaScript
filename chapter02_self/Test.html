<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // 请使用JavaScript中的for语句计算1~100所有能被4整除的整数之和

        var count=0
        for(var i =1;i<=100;i++){
            if(i%4==0){
                count+=i
            }
        }
        console.log(count)
    </script>
</body>
</html>
